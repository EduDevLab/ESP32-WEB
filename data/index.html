<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Sensor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    h1 {
      font-size: 1.3rem;
      color: #94a3b8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .cards {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1e293b;
      border-radius: 1.5rem;
      padding: 2.5rem 3rem;
      text-align: center;
      border: 1px solid #334155;
      min-width: 180px;
      transition: transform 0.2s;
    }

    .card:hover { transform: translateY(-5px); }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    .valor { font-size: 3.5rem; font-weight: bold; }
    .unidad { color: #94a3b8; margin-top: 0.3rem; }
    .temp .valor { color: #f97316; }
    .hum  .valor { color: #38bdf8; }

    .estado {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #64748b;
      font-size: 0.85rem;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulso 1.5s infinite;
    }

    .dot.error { background: #ef4444; animation: none; }

    @keyframes pulso {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
  </style>
</head>
<body>

  <h1>⚡ ESP32 Dashboard</h1>

  <div class="cards">
    <div class="card temp">
      <div class="icon">🌡️</div>
      <div class="valor" id="temp">--</div>
      <div class="unidad">°C Temperatura</div>
    </div>
    <div class="card hum">
      <div class="icon">💧</div>
      <div class="valor" id="hum">--</div>
      <div class="unidad">% Humedad</div>
    </div>
  </div>

  <div class="estado">
    <div class="dot" id="dot"></div>
    <span id="estado-txt">Conectando...</span>
  </div>

  <script>
    async function leerSensor() {
      try {
        const res  = await fetch("/datos");
        const data = await res.json();

        document.getElementById("temp").textContent = data.temperatura.toFixed(1);
        document.getElementById("hum").textContent  = data.humedad.toFixed(1);
        document.getElementById("dot").classList.remove("error");
        document.getElementById("estado-txt").textContent =
          "Actualizado: " + new Date().toLocaleTimeString();

      } catch (err) {
        document.getElementById("dot").classList.add("error");
        document.getElementById("estado-txt").textContent = "Error leyendo sensor";
      }
    }

    leerSensor();
    setInterval(leerSensor, 3000);
  </script>

</body>
</html>
